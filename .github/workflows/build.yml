name: build-multiarch

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - bin/**
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/sonar-scanner-cli

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read scanner version from Dockerfile
        id: ver
        run: echo "version=$(sed -n 's/^ARG SONAR_SCANNER_VERSION=//p' Dockerfile)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
